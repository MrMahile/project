<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topbar">
        <div class="welcome">Welcome <span id="welcome-user"></span></div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="home.html">Pay Bill</a>
        <a href="complaint.html" class="active">Register Complaint</a>
        <a href="complaint_status.html">Complaint Status</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Register Complaint / Service Request</h1>

        <div class="card">
            <form id="complaint-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Complaint / Service Type <span class="required">*</span></label>
                        <select name="complaint-type" id="complaint-type">
                            <option value="">-- Select Type --</option>
                        </select>
                        <div class="error-text"></div>
                    </div>
                    <div class="form-group">
                        <label>Category <span class="required">*</span></label>
                        <select name="category" id="category">
                            <option value="">-- Select Category --</option>
                        </select>
                        <div class="error-text"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Person <span class="required">*</span></label>
                        <input type="text" name="contact-person" placeholder="Enter contact person name">
                        <div class="error-text"></div>
                    </div>
                    <div class="form-group">
                        <label>Landmark</label>
                        <input type="text" name="landmark" placeholder="Nearby landmark">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Consumer Number <span class="required">*</span></label>
                        <input type="text" name="consumer-no" maxlength="13" placeholder="13-digit consumer number">
                        <div class="error-text"></div>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number <span class="required">*</span></label>
                        <input type="text" name="mobile-number" maxlength="10" placeholder="10-digit mobile number">
                        <div class="error-text"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Problem Description <span class="required">*</span></label>
                    <textarea name="problem-desc" rows="4" placeholder="Describe the problem in detail"></textarea>
                    <div class="error-text"></div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="3" placeholder="Enter your address"></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Submit Complaint</button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                </div>
            </form>

            <div class="success-screen" id="complaint-success" style="display:none;">
                <div class="success-icon">&#10004;</div>
                <h2 style="color:#27ae60;">Complaint Registered Successfully!</h2>
                <div class="details">
                    <p><strong>Complaint ID:</strong> <span id="complaint-id-display"></span></p>
                    <p><strong>Type:</strong> <span id="complaint-type-display"></span></p>
                    <p><strong>Category:</strong> <span id="complaint-category-display"></span></p>
                </div>
                <div class="btn-group" style="margin-top:30px;">
                    <a href="complaint_status.html" class="btn btn-primary">Check Status</a>
                    <a href="home.html" class="btn btn-success">Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initComplaint();</script>
</body>
</html>
