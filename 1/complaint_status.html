<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Status - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .status-pending {
            background: #f39c12;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-progress {
            background: #2980b9;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-resolved {
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="welcome">Welcome <span id="welcome-user"></span></div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="home.html">Pay Bill</a>
        <a href="complaint.html">Register Complaint</a>
        <a href="complaint_status.html" class="active">Complaint Status</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Complaint Status</h1>

        <div class="card">
            <table class="bill-table">
                <thead>
                    <tr>
                        <th>Complaint ID</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="status-table-body"></tbody>
            </table>

            <div class="btn-group" style="margin-top:25px;">
                <a href="complaint.html" class="btn btn-primary">Register New Complaint</a>
                <a href="home.html" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initComplaintStatus();</script>
</body>
</html>
