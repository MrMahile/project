<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topbar">
        <div class="welcome">Welcome <span id="welcome-user"></span></div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <nav class="navbar">
        <a href="home.html" class="active">Home</a>
        <a href="home.html">Pay Bill</a>
        <a href="complaint.html">Register Complaint</a>
        <a href="complaint_status.html">Complaint Status</a>
    </nav>

    <div class="container">
        <h1 class="page-title">View & Pay Bills</h1>

        <div class="card">
            <p style="margin-bottom:15px; color:#7f8c8d;">Select the bills you want to pay:</p>

            <table class="bill-table">
                <thead>
                    <tr>
                        <th>Select</th>
                        <th>Bill ID</th>
                        <th>Month</th>
                        <th>Amount</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bill-table-body"></tbody>
            </table>

            <div class="total-section" id="total-amount">Total Amount: &#8377; 0.00</div>

            <div class="btn-group">
                <button class="btn btn-success" id="proceed-btn">Proceed to Pay</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initHome();</script>
</body>
</html>
