<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topbar">
        <div class="welcome">Welcome <span id="welcome-user"></span></div>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="home.html" class="active">Pay Bill</a>
        <a href="complaint.html">Register Complaint</a>
        <a href="complaint_status.html">Complaint Status</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Payment Summary</h1>

        <div class="card">
            <div class="payment-summary">
                <div class="row">
                    <span>Bill Amount:</span>
                    <span id="summary-bill-amount">&#8377; 0.00</span>
                </div>
                <div class="row">
                    <span>PG Charge (2%):</span>
                    <span id="summary-pg-charge">&#8377; 0.00</span>
                </div>
                <div class="row">
                    <span>Total Payable Amount:</span>
                    <span id="summary-total">&#8377; 0.00</span>
                </div>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>Mode of Payment</label>
                <select disabled>
                    <option>Credit / Debit Card</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn btn-success" id="pay-now-btn">Pay Now</button>
                <button class="btn btn-secondary" id="back-home-btn">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initPayment();</script>
</body>
</html>
