<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topbar">
        <div style="font-size:18px; font-weight:bold;">Electricity Board</div>
        <a href="login.html" class="btn" style="background:#27ae60; color:white; padding:8px 20px; font-size:14px;">Login</a>
    </div>

    <div class="container">
        <h1 class="page-title">Customer Registration</h1>

        <div class="card" id="registration-form-card">
            <form id="registration-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Consumer ID</label>
                        <input type="text" value="Auto-generated" disabled style="background:#f0f0f0;">
                    </div>
                    <div class="form-group">
                        <label>Bill Number <span class="required">*</span></label>
                        <input type="text" name="bill-no" maxlength="5" placeholder="Last 5 digits of bill number">
                        <div class="error-text"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Title <span class="required">*</span></label>
                        <select name="title" required>
                            <option value="">-- Select --</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Mrs.">Mrs.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Dr.">Dr.</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Customer Name <span class="required">*</span></label>
                        <input type="text" name="cust-name" maxlength="50" placeholder="Enter full name (max 50 chars)">
                        <div class="error-text"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" placeholder="Enter email address">
                    <div class="error-text"></div>
                </div>

                <div class="form-group">
                    <label>Mobile Number <span class="required">*</span></label>
                    <div class="mobile-group">
                        <select name="country-code" id="country-code" required>
                            <option value="">Country Code</option>
                        </select>
                        <input type="text" name="mobile" maxlength="10" placeholder="10-digit mobile number">
                    </div>
                    <div class="error-text"></div>
                </div>

                <div class="form-group">
                    <label>User ID <span class="required">*</span></label>
                    <input type="text" name="user-id" minlength="5" maxlength="20" placeholder="Min 5, Max 20 characters">
                    <div class="error-text"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" name="password" maxlength="30" placeholder="Max 30 characters">
                        <div class="error-text"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <input type="password" name="confirm-password" maxlength="30" placeholder="Re-enter password">
                        <div class="error-text"></div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Register</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>

            <div class="success-screen" id="success-screen" style="display:none;">
                <div class="success-icon">&#10004;</div>
                <h2>Consumer Registration Successful.</h2>
                <div class="details">
                    <p><strong>Customer ID:</strong> <span id="reg-cust-id"></span></p>
                    <p><strong>Customer Name:</strong> <span id="reg-cust-name"></span></p>
                    <p><strong>Email:</strong> <span id="reg-cust-email"></span></p>
                </div>
                <div class="btn-group" style="margin-top:30px;">
                    <a href="login.html" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initRegistration();</script>
</body>
</html>
