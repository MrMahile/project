<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Electricity Board</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
            padding: 40px;
        }
        .login-card h1 {
            text-align: center;
            color: #1a5276;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-card .form-group {
            margin-bottom: 20px;
        }
        .error-box {
            background: #fdecea;
            color: #e74c3c;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
        .login-card .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .login-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-links a {
            color: #2980b9;
            text-decoration: none;
        }
        .login-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Electricity Board</h1>
            <p class="subtitle">Customer Login</p>

            <div class="error-box" id="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" name="login-userid" placeholder="Enter your User ID" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="login-password" placeholder="Enter your Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="login-links">
                <p>Don't have an account? <a href="index.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>initLogin();</script>
</body>
</html>
